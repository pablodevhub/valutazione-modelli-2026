<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Audio Visualizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        .ui-overlay { position: relative; z-index: 10; }
        input[type="file"]::file-selector-button {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        input[type="file"]::file-selector-button:hover {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            transform: scale(1.05);
        }
        .glow { text-shadow: 0 0 20px rgba(139, 92, 246, 0.8), 0 0 40px rgba(139, 92, 246, 0.4); }
        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.5); opacity: 0; }
        }
        .pulse-ring { animation: pulse-ring 2s ease-out infinite; }
    </style>
</head>
<body class="bg-black text-white font-sans">

    <div id="canvas-container"></div>

    <div class="ui-overlay flex flex-col items-center justify-center min-h-screen p-6">
        <!-- Upload Screen -->
        <div id="upload-screen" class="text-center">
            <h1 class="text-6xl font-black mb-4 glow bg-gradient-to-r from-purple-400 via-pink-400 to-indigo-400 bg-clip-text text-transparent">
                3D Audio Visualizer
            </h1>
            <p class="text-gray-400 mb-8 text-lg">Carica un file MP3 o WAV e immergiti nella musica</p>
            
            <label class="inline-block cursor-pointer">
                <input type="file" id="file-input" accept=".mp3,.wav,audio/mpeg,audio/wav" class="hidden" />
                <div class="bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 px-8 py-4 rounded-2xl text-xl font-bold transition-all duration-300 hover:scale-105 hover:shadow-2xl hover:shadow-purple-500/30 flex items-center gap-3">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"/>
                    </svg>
                    Scegli File Audio
                </div>
            </label>

            <div class="mt-8 flex gap-6 justify-center text-sm text-gray-500">
                <span class="flex items-center gap-2">🎵 MP3</span>
                <span class="flex items-center gap-2">🎧 WAV</span>
            </div>
        </div>

        <!-- Player Screen (hidden initially) -->
        <div id="player-screen" class="hidden text-center w-full max-w-2xl">
            <div class="mb-6">
                <h2 id="track-name" class="text-3xl font-bold glow mb-2"></h2>
                <p class="text-gray-400 text-sm" id="track-info"></p>
            </div>

            <!-- Progress Bar -->
            <div class="mb-6 px-4">
                <div class="w-full bg-gray-800 rounded-full h-2 cursor-pointer" id="progress-container">
                    <div id="progress-bar" class="bg-gradient-to-r from-purple-500 to-pink-500 h-2 rounded-full transition-all duration-100" style="width: 0%"></div>
                </div>
                <div class="flex justify-between text-xs text-gray-500 mt-2">
                    <span id="current-time">0:00</span>
                    <span id="total-time">0:00</span>
                </div>
            </div>

            <!-- Controls -->
            <div class="flex items-center justify-center gap-6 mb-8">
                <button id="btn-restart" class="w-12 h-12 bg-gray-800 hover:bg-gray-700 rounded-full flex items-center justify-center transition-all hover:scale-110">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
                </button>
                <button id="btn-play" class="w-16 h-16 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 rounded-full flex items-center justify-center transition-all hover:scale-110 shadow-lg shadow-purple-500/30">
                    <svg id="icon-play" class="w-8 h-8 ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="icon-pause" class="w-8 h-8 hidden" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button id="btn-forward" class="w-12 h-12 bg-gray-800 hover:bg-gray-700 rounded-full flex items-center justify-center transition-all hover:scale-110">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/></svg>
                </button>
            </div>

            <!-- Volume -->
            <div class="flex items-center justify-center gap-3 mb-8">
                <svg class="w-5 h-5 text-gray-400" fill="currentColor" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
                <input type="range" id="volume-slider" min="0" max="100" value="80" class="w-40 accent-purple-500" />
                <svg class="w-5 h-5 text-gray-400" fill="currentColor" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
            </div>

            <button id="btn-new-file" class="text-gray-500 hover:text-purple-400 transition-colors text-sm underline underline-offset-4">
                🔄 Carica un altro file
            </button>
        </div>
    </div>

    <script>
        // ==================== AUDIO SETUP ====================
        let audioContext, analyser, source, audioElement, dataArray, bufferLength;
        let isPlaying = false;
        let currentFileName = '';

        const fileInput = document.getElementById('file-input');
        const uploadScreen = document.getElementById('upload-screen');
        const playerScreen = document.getElementById('player-screen');
        const btnPlay = document.getElementById('btn-play');
        const btnRestart = document.getElementById('btn-restart');
        const btnForward = document.getElementById('btn-forward');
        const btnNewFile = document.getElementById('btn-new-file');
        const volumeSlider = document.getElementById('volume-slider');
        const progressBar = document.getElementById('progress-bar');
        const progressContainer = document.getElementById('progress-container');
        const currentTimeEl = document.getElementById('current-time');
        const totalTimeEl = document.getElementById('total-time');
        const trackNameEl = document.getElementById('track-name');
        const trackInfoEl = document.getElementById('track-info');
        const iconPlay = document.getElementById('icon-play');
        const iconPause = document.getElementById('icon-pause');

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            currentFileName = file.name;
            initAudio(file);
        });

        function initAudio(file) {
            if (audioElement) {
                audioElement.pause();
                audioElement.src = '';
            }

            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 512;
            analyser.smoothingTimeConstant = 0.8;
            bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);

            audioElement = new Audio();
            audioElement.crossOrigin = "anonymous";
            audioElement.src = URL.createObjectURL(file);
            audioElement.volume = volumeSlider.value / 100;

            source = audioContext.createMediaElementSource(audioElement);
            source.connect(analyser);
            analyser.connect(audioContext.destination);

            trackNameEl.textContent = file.name.replace(/\.[^/.]+$/, "");
            trackInfoEl.textContent = `${(file.size / (1024 * 1024)).toFixed(2)} MB`;

            audioElement.addEventListener('loadedmetadata', () => {
                totalTimeEl.textContent = formatTime(audioElement.duration);
            });

            audioElement.addEventListener('timeupdate', () => {
                const pct = (audioElement.currentTime / audioElement.duration) * 100;
                progressBar.style.width = pct + '%';
                currentTimeEl.textContent = formatTime(audioElement.currentTime);
            });

            audioElement.addEventListener('ended', () => {
                isPlaying = false;
                iconPlay.classList.remove('hidden');
                iconPause.classList.add('hidden');
            });

            uploadScreen.classList.add('hidden');
            playerScreen.classList.remove('hidden');

            audioElement.play();
            isPlaying = true;
            iconPlay.classList.add('hidden');
            iconPause.classList.remove('hidden');

            initThreeJS();
            animate();
        }

        btnPlay.addEventListener('click', () => {
            if (isPlaying) {
                audioElement.pause();
                isPlaying = false;
                iconPlay.classList.remove('hidden');
                iconPause.classList.add('hidden');
            } else {
                audioContext.resume();
                audioElement.play();
                isPlaying = true;
                iconPlay.classList.add('hidden');
                iconPause.classList.remove('hidden');
            }
        });

        btnRestart.addEventListener('click', () => {
            audioElement.currentTime = 0;
            audioElement.play();
            isPlaying = true;
            iconPlay.classList.add('hidden');
            iconPause.classList.remove('hidden');
        });

        btnForward.addEventListener('click', () => {
            audioElement.currentTime = Math.min(audioElement.currentTime + 10, audioElement.duration);
        });

        btnNewFile.addEventListener('click', () => {
            audioElement.pause();
            audioElement.src = '';
            if (audioContext) audioContext.close();
            uploadScreen.classList.remove('hidden');
            playerScreen.classList.add('hidden');
            isPlaying = false;
            iconPlay.classList.remove('hidden');
            iconPause.classList.add('hidden');
            progressBar.style.width = '0%';
            fileInput.value = '';
            if (scene) {
                while(scene.children.length > 0) {
                    const obj = scene.children[0];
                    scene.remove(obj);
                    if (obj.geometry) obj.geometry.dispose();
                    if (obj.material) obj.material.dispose();
                }
            }
        });

        volumeSlider.addEventListener('input', (e) => {
            audioElement.volume = e.target.value / 100;
        });

        progressContainer.addEventListener('click', (e) => {
            const rect = progressContainer.getBoundingClientRect();
            const pct = (e.clientX - rect.left) / rect.width;
            audioElement.currentTime = pct * audioElement.duration;
        });

        function formatTime(s) {
            if (isNaN(s)) return '0:00';
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${m}:${sec.toString().padStart(2, '0')}`;
        }

        // ==================== THREE.JS 3D VISUALIZER ====================
        let scene, camera, renderer, coreSphere, bars = [], particles = [], particleSystem, ringGeometry;
        let clock = new THREE.Clock();

        function initThreeJS() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.035);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 30;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Lights
            const ambientLight = new THREE.AmbientLight(0x222244, 0.5);
            scene.add(ambientLight);

            const pointLight1 = new THREE.PointLight(0x8b5cf6, 2, 100);
            pointLight1.position.set(10, 10, 10);
            scene.add(pointLight1);

            const pointLight2 = new THREE.PointLight(0xec4899, 2, 100);
            pointLight2.position.set(-10, -10, 10);
            scene.add(pointLight2);

            const pointLight3 = new THREE.PointLight(0x6366f1, 1.5, 100);
            pointLight3.position.set(0, 10, -10);
            scene.add(pointLight3);

            // Core Sphere
            const coreGeo = new THREE.IcosahedronGeometry(3, 4);
            const coreMat = new THREE.MeshPhongMaterial({
                color: 0x8b5cf6,
                emissive: 0x4c1d95,
                emissiveIntensity: 0.5,
                wireframe: true,
                transparent: true,
                opacity: 0.8
            });
            coreSphere = new THREE.Mesh(coreGeo, coreMat);
            scene.add(coreSphere);

            // Inner solid sphere
            const innerGeo = new THREE.SphereGeometry(2, 32, 32);
            const innerMat = new THREE.MeshPhongMaterial({
                color: 0x7c3aed,
                emissive: 0x6d28d9,
                emissiveIntensity: 0.8,
                transparent: true,
                opacity: 0.6
            });
            const innerSphere = new THREE.Mesh(innerGeo, innerMat);
            scene.add(innerSphere);

            // Frequency Bars (circular equalizer)
            const barCount = 64;
            for (let i = 0; i < barCount; i++) {
                const angle = (i / barCount) * Math.PI * 2;
                const height = 0.5;
                const geo = new THREE.BoxGeometry(0.4, height, 0.4);
                const hue = (i / barCount) * 0.5 + 0.7; // purple to pink
                const color = new THREE.Color().setHSL(hue, 1, 0.5);
                const mat = new THREE.MeshPhongMaterial({
                    color: color,
                    emissive: color,
                    emissiveIntensity: 0.3,
                    transparent: true,
                    opacity: 0.9
                });
                const bar = new THREE.Mesh(geo, mat);
                const radius = 8;
                bar.position.x = Math.cos(angle) * radius;
                bar.position.z = Math.sin(angle) * radius;
                bar.position.y = 0;
                bar.lookAt(0, 0, 0);
                scene.add(bar);
                bars.push(bar);
            }

            // Orbiting ring
            const ringGeo = new THREE.TorusGeometry(12, 0.05, 16, 100);
            const ringMat = new THREE.MeshBasicMaterial({ color: 0x6366f1, transparent: true, opacity: 0.4 });
            ringGeometry = new THREE.Mesh(ringGeo, ringMat);
            ringGeometry.rotation.x = Math.PI / 2;
            scene.add(ringGeometry);

            // Particles
            const particleCount = 2000;
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);
            const sizes = new Float32Array(particleCount);

            for (let i = 0; i < particleCount; i++) {
                positions[i * 3] = (Math.random() - 0.5) * 80;
                positions[i * 3 + 1] = (Math.random() - 0.5) * 80;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 80;

                const color = new THREE.Color().setHSL(Math.random() * 0.3 + 0.7, 1, 0.6);
                colors[i * 3] = color.r;
                colors[i * 3 + 1] = color.g;
                colors[i * 3 + 2] = color.b;

                sizes[i] = Math.random() * 3 + 0.5;
            }

            const particleGeo = new THREE.BufferGeometry();
            particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            particleGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            particleGeo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

            const particleMat = new THREE.PointsMaterial({
                size: 0.3,
                vertexColors: true,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending,
                sizeAttenuation: true
            });

            particleSystem = new THREE.Points(particleGeo, particleMat);
            scene.add(particleSystem);

            window.addEventListener('resize', onResize);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            const time = clock.getElapsedTime();

            if (analyser && isPlaying) {
                analyser.getByteFrequencyData(dataArray);
            }

            // Get audio data
            let bass = 0, mid = 0, treble = 0, avgEnergy = 0;
            if (dataArray) {
                const len = dataArray.length;
                for (let i = 0; i < len; i++) {
                    avgEnergy += dataArray[i];
                    if (i < len * 0.1) bass += dataArray[i];
                    else if (i < len * 0.5) mid += dataArray[i];
                    else treble += dataArray[i];
                }
                bass = bass / (len * 0.1) / 255;
                mid = mid / (len * 0.4) / 255;
                treble = treble / (len * 0.5) / 255;
                avgEnergy = avgEnergy / len / 255;
            }

            // Animate core sphere
            if (coreSphere) {
                const scale = 1 + bass * 0.8;
                coreSphere.scale.set(scale, scale, scale);
                coreSphere.rotation.x = time * 0.3;
                coreSphere.rotation.y = time * 0.5;
                const coreMat = coreSphere.material;
                coreMat.emissiveIntensity = 0.3 + avgEnergy * 2;
                coreMat.color.setHSL(0.75 + bass * 0.1, 1, 0.5 + avgEnergy * 0.3);
            }

            // Animate bars
            bars.forEach((bar, i) => {
                const dataIndex = Math.floor((i / bars.length) * bufferLength);
                const value = dataArray ? dataArray[dataIndex] / 255 : 0;
                const targetHeight = 0.5 + value * 15;
                bar.scale.y += (targetHeight - bar.scale.y) * 0.3;
                bar.position.y = (bar.scale.y - 0.5) / 2;

                const hue = (i / bars.length) * 0.5 + 0.7;
                bar.material.color.setHSL(hue + value * 0.1, 1, 0.4 + value * 0.4);
                bar.material.emissiveIntensity = 0.3 + value * 2;
            });

            // Animate ring
            if (ringGeometry) {
                ringGeometry.rotation.z = time * 0.2;
                ringGeometry.scale.set(1 + mid * 0.3, 1 + mid * 0.3, 1 + mid * 0.3);
                (ringGeometry.material).opacity = 0.2 + avgEnergy * 0.5;
            }

            // Animate particles
            if (particleSystem) {
                particleSystem.rotation.y = time * 0.05;
                particleSystem.rotation.x = time * 0.03;

                const positions = particleSystem.geometry.attributes.position.array;
                for (let i = 0; i < positions.length; i += 3) {
                    positions[i + 1] += Math.sin(time + i) * 0.02 + (avgEnergy - 0.5) * 0.1;
                    positions[i] += Math.cos(time * 0.7 + i) * 0.01;

                    // Wrap around
                    if (positions[i + 1] > 40) positions[i + 1] = -40;
                    if (positions[i + 1] < -40) positions[i + 1] = 40;
                    if (positions[i] > 40) positions[i] = -40;
                    if (positions[i] < -40) positions[i] = 40;
                }
                particleSystem.geometry.attributes.position.needsUpdate = true;
                (particleSystem.material).size = 0.2 + avgEnergy * 0.8;
                (particleSystem.material).opacity = 0.4 + avgEnergy * 0.6;
            }

            // Camera movement
            camera.position.x = Math.sin(time * 0.2) * 5;
            camera.position.y = Math.cos(time * 0.15) * 3;
            camera.lookAt(0, 0, 0);

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
