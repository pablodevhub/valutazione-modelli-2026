<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧱 Arkanoid Light</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:'Segoe UI',sans-serif;overflow:hidden;color:#fff}
h1{font-size:1.5rem;margin-bottom:8px;letter-spacing:3px;text-transform:uppercase;color:#00d4ff;text-shadow:0 0 20px #00d4ff55}
#info{display:flex;gap:30px;margin-bottom:8px;font-size:0.9rem;color:#aaa}
#info span{color:#00d4ff}
canvas{border:2px solid #1a1a3a;border-radius:8px;box-shadow:0 0 30px #00d4ff22;cursor:none}
#overlay{position:absolute;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0a1aee;padding:40px;border-radius:16px;border:2px solid #00d4ff;text-align:center}
#overlay h2{font-size:2rem;margin-bottom:10px;color:#00d4ff}
#overlay p{margin-bottom:8px;color:#ccc}
#overlay button{margin-top:15px;padding:12px 40px;font-size:1.1rem;border:none;border-radius:8px;background:linear-gradient(135deg,#00d4ff,#7b2ff7);color:#fff;cursor:pointer;font-weight:bold;letter-spacing:1px;transition:transform 0.2s,box-shadow 0.2s}
#overlay button:hover{transform:scale(1.05);box-shadow:0 0 25px #00d4ff88}
.hidden{display:none!important}
</style>
</head>
<body>
<h1>🧱 Arkanoid Light</h1>
<div id="info">
<div>Punteggio: <span id="score">0</span></div>
<div>Vite: <span id="lives">3</span></div>
<div>Livello: <span id="level">1</span></div>
</div>
<canvas id="game" width="600" height="500"></canvas>

<div id="overlay">
<h2 id="ov-title">🧱 ARKANOID LIGHT</h2>
<p id="ov-text">Muovi il mouse o usa ← → per controllare la racchetta</p>
<button id="ov-btn" onclick="startGame()">GIOCA</button>
</div>

<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');
const overlay=document.getElementById('overlay');
const ovTitle=document.getElementById('ov-title');
const ovText=document.getElementById('ov-text');
const ovBtn=document.getElementById('ov-btn');
const scoreEl=document.getElementById('score');
const livesEl=document.getElementById('lives');
const levelEl=document.getElementById('level');

// --- GAME VARS ---
let score=0, lives=3, level=1, running=false, animId;
let ball, paddle, bricks, particles;

// Colors per riga mattoni
const ROW_COLORS=['#ff4757','#ff6b81','#ffa502','#2ed573','#1e90ff','#a855f7','#ff6348'];

function init(){
  score=0; lives=3; level=1;
  updateUI();
  createBricks();
  resetBall();
  paddle={x:canvas.width/2-50, y:canvas.height-30, w:100, h:12, speed:8, dx:0};
  ball={x:canvas.width/2, y:canvas.height-50, r:7, dx:4, dy:-4, speed:4.5};
  particles=[];
}

function createBricks(){
  bricks=[];
  const cols=10, rows=6, bw=52, bh=20, gap=4, offsetX=16, offsetY=40;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      bricks.push({
        x:offsetX+c*(bw+gap),
        y:offsetY+r*(bh+gap),
        w:bw, h:bh,
        alive:true,
        color:ROW_COLORS[r%ROW_COLORS.length],
        hp:r<2?2:1
      });
    }
  }
}

function resetBall(){
  ball.x=canvas.width/2;
  ball.y=canvas.height-50;
  ball.dx=(Math.random()>0.5?1:-1)*4;
  ball.dy=-4.5;
  ball.speed=4.5+level*0.5;
}

function updateUI(){
  scoreEl.textContent=score;
  livesEl.textContent=lives;
  levelEl.textContent=level;
}

// --- PARTICLES ---
function spawnParticles(x,y,color){
  for(let i=0;i<8;i++){
    particles.push({
      x,y,
      dx:(Math.random()-0.5)*6,
      dy:(Math.random()-0.5)*6,
      r:Math.random()*3+1,
      life:1,
      color
    });
  }
}

// --- INPUT ---
let keys={};
document.addEventListener('keydown',e=>{keys[e.key]=true;});
document.addEventListener('keyup',e=>{keys[e.key]=false;});
canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left;
  paddle.x=mx-paddle.w/2;
  paddle.x=Math.max(0,Math.min(canvas.width-paddle.w,paddle.x));
});

// --- GAME LOOP ---
function update(){
  // Paddle
  if(keys['ArrowLeft']||keys['a']) paddle.x-=paddle.speed;
  if(keys['ArrowRight']||keys['d']) paddle.x+=paddle.speed;
  paddle.x=Math.max(0,Math.min(canvas.width-paddle.w,paddle.x));

  // Ball
  ball.x+=ball.dx;
  ball.y+=ball.dy;

  // Walls
  if(ball.x-ball.r<=0||ball.x+ball.r>=canvas.width) ball.dx*=-1;
  if(ball.y-ball.r<=0) ball.dy*=-1;

  // Paddle hit
  if(ball.dy>0 && ball.y+ball.r>=paddle.y && ball.y+ball.r<=paddle.y+paddle.h+4
     && ball.x>=paddle.x && ball.x<=paddle.x+paddle.w){
    ball.dy*=-1;
    let hitPos=(ball.x-paddle.x)/paddle.w; // 0..1
    ball.dx=(hitPos-0.5)*8;
    spawnParticles(ball.x,ball.y,'#00d4ff');
  }

  // Bottom
  if(ball.y+ball.r>canvas.height){
    lives--;
    updateUI();
    if(lives<=0){ gameOver(); return; }
    resetBall();
  }

  // Bricks
  for(let b of bricks){
    if(!b.alive) continue;
    if(ball.x+ball.r>b.x && ball.x-ball.r<b.x+b.w
       && ball.y+ball.r>b.y && ball.y-ball.r<b.y+b.h){
      b.hp--;
      if(b.hp<=0){
        b.alive=false;
        score+=10*level;
        spawnParticles(b.x+b.w/2,b.y+b.h/2,b.color);
      } else {
        ball.dy*=-1;
        spawnParticles(b.x+b.w/2,b.y+b.h/2,b.color);
      }
      updateUI();
      break;
    }
  }

  // Next level
  if(bricks.every(b=>!b.alive)){
    level++;
    updateUI();
    createBricks();
    resetBall();
    ball.speed+=0.5;
    ball.dx=ball.dx>0?4.5+level*0.5:-(4.5+level*0.5);
    ball.dy=-(4.5+level*0.5);
  }

  // Particles
  particles=particles.filter(p=>{
    p.x+=p.dx; p.y+=p.dy; p.life-=0.03;
    return p.life>0;
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Background grid
  ctx.strokeStyle='#ffffff08';
  ctx.lineWidth=1;
  for(let i=0;i<canvas.width;i+=30){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,canvas.height);ctx.stroke();}
  for(let i=0;i<canvas.height;i+=30){ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(canvas.width,i);ctx.stroke();}

  // Bricks
  for(let b of bricks){
    if(!b.alive) continue;
    ctx.fillStyle=b.color;
    ctx.shadowColor=b.color;
    ctx.shadowBlur=6;
    ctx.beginPath();
    ctx.roundRect(b.x,b.y,b.w,b.h,4);
    ctx.fill();
    if(b.hp>1){
      ctx.fillStyle='#fff6';
      ctx.font='bold 10px sans-serif';
      ctx.textAlign='center';
      ctx.fillText('2',b.x+b.w/2,b.y+b.h/2+4);
    }
    ctx.shadowBlur=0;
  }

  // Paddle
  let grad=ctx.createLinearGradient(paddle.x,paddle.y,paddle.x+paddle.w,paddle.y);
  grad.addColorStop(0,'#00d4ff');
  grad.addColorStop(1,'#7b2ff7');
  ctx.fillStyle=grad;
  ctx.shadowColor='#00d4ff';
  ctx.shadowBlur=15;
  ctx.beginPath();
  ctx.roundRect(paddle.x,paddle.y,paddle.w,paddle.h,6);
  ctx.fill();
  ctx.shadowBlur=0;

  // Ball
  ctx.fillStyle='#fff';
  ctx.shadowColor='#fff';
  ctx.shadowBlur=12;
  ctx.beginPath();
  ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);
  ctx.fill();
  ctx.shadowBlur=0;

  // Particles
  for(let p of particles){
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha=1;
}

function loop(){
  if(!running) return;
  update();
  draw();
  animId=requestAnimationFrame(loop);
}

function startGame(){
  overlay.classList.add('hidden');
  init();
  running=true;
  loop();
}

function gameOver(){
  running=false;
  cancelAnimationFrame(animId);
  ovTitle.textContent='💀 GAME OVER';
  ovText.textContent=`Punteggio finale: ${score} — Livello raggiunto: ${level}`;
  ovBtn.textContent='RIPROVA';
  overlay.classList.remove('hidden');
}

// Init overlay visible
overlay.classList.remove('hidden');
</script>
</body>
</html>
