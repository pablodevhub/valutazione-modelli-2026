<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARKANOID</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  :root {
    --bg:#06060e;--surface:#0c0c1a;--accent:#00f0ff;--accent2:#ff2d6b;
    --accent3:#a855f7;--gold:#fbbf24;--text:#e0e7ff;--muted:#475569;
  }
  html,body{height:100%;background:var(--bg);overflow:hidden;font-family:'Orbitron',sans-serif;color:var(--text);user-select:none;-webkit-user-select:none}
  body{display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:radial-gradient(ellipse at 30% 20%,rgba(0,240,255,0.04) 0%,transparent 50%),
    radial-gradient(ellipse at 70% 80%,rgba(255,45,107,0.04) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 50%,rgba(168,85,247,0.03) 0%,transparent 60%),var(--bg)}
  body::before{content:'';position:fixed;inset:0;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    opacity:0.025;pointer-events:none;z-index:9999}
  #game-wrapper{position:relative;display:flex;flex-direction:column;align-items:center;gap:0}
  #hud{width:560px;display:flex;justify-content:space-between;align-items:center;padding:12px 20px;
    background:linear-gradient(180deg,rgba(12,12,26,0.95),rgba(6,6,14,0.9));
    border:1px solid rgba(0,240,255,0.12);border-bottom:none;border-radius:12px 12px 0 0;backdrop-filter:blur(8px)}
  .hud-item{display:flex;flex-direction:column;align-items:center;gap:2px}
  .hud-label{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:0.2em;color:var(--muted);text-transform:uppercase}
  .hud-value{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:700;color:var(--accent);text-shadow:0 0 12px rgba(0,240,255,0.4)}
  #lives-display{display:flex;gap:4px;align-items:center}
  .life-pip{width:10px;height:10px;border-radius:50%;background:var(--accent2);box-shadow:0 0 6px rgba(255,45,107,0.5);transition:opacity 0.3s,transform 0.3s}
  .life-pip.lost{opacity:0.15;transform:scale(0.7)}
  canvas{display:block;border:1px solid rgba(0,240,255,0.12);border-top:none;border-radius:0 0 12px 12px;cursor:none}
  #overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:100;pointer-events:none;opacity:0;transition:opacity 0.4s ease}
  #overlay.visible{opacity:1;pointer-events:auto}
  #overlay h1{font-size:42px;font-weight:900;letter-spacing:0.15em;
    background:linear-gradient(135deg,var(--accent),var(--accent3),var(--accent2));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;animation:titlePulse 2s ease-in-out infinite}
  @keyframes titlePulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.3)}}
  #overlay .subtitle{font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:0.3em;color:var(--muted);margin-bottom:32px}
  #overlay .prompt{font-family:'Share Tech Mono',monospace;font-size:14px;color:var(--accent);letter-spacing:0.15em;animation:blink 1.2s ease-in-out infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
  #overlay .final-score{font-size:16px;color:var(--gold);margin-bottom:6px;text-shadow:0 0 10px rgba(251,191,36,0.3)}
  #overlay .final-level{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:28px;letter-spacing:0.2em}
  .scanlines{position:fixed;inset:0;pointer-events:none;z-index:9998;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px)}
  #level-banner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    font-size:36px;font-weight:900;letter-spacing:0.2em;color:var(--gold);
    text-shadow:0 0 30px rgba(251,191,36,0.6);z-index:90;opacity:0;pointer-events:none;transition:opacity 0.5s}
  #level-banner.show{opacity:1}
</style>
</head>
<body>
<div class="scanlines"></div>
<div id="game-wrapper">
  <div id="hud">
    <div class="hud-item"><span class="hud-label">Score</span><span class="hud-value" id="score-val">0</span></div>
    <div class="hud-item"><span class="hud-label">Level</span><span class="hud-value" id="level-val">1</span></div>
    <div class="hud-item"><span class="hud-label">Lives</span><div id="lives-display"></div></div>
  </div>
  <canvas id="game" width="560" height="640"></canvas>
  <div id="overlay" class="visible">
    <h1>ARKANOID</h1>
    <div class="subtitle">NEON EDITION</div>
    <div class="prompt">CLICK TO START</div>
  </div>
  <div id="level-banner"></div>
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const scoreEl = document.getElementById('score-val');
  const levelEl = document.getElementById('level-val');
  const livesEl = document.getElementById('lives-display');
  const overlay = document.getElementById('overlay');
  const banner = document.getElementById('level-banner');

  /* ── State ── */
  const STATE = { MENU:0, PLAYING:1, BALLHELD:2, GAMEOVER:3, LEVELUP:4 };
  let state = STATE.MENU;
  let score = 0, lives = 5, level = 1, combo = 0, comboTimer = 0;
  let particles = [], screenFlash = 0;
  let powerUps = [], activePowerUps = {}, lasers = [];
  let levelUpTimer = 0;

  /* ── Power-up definitions ── */
  const PU = {
    WIDE:   {color:'#00f0ff',sym:'W',dur:12000,desc:'WIDE PADDLE'},
    MULTI:  {color:'#a855f7',sym:'M',dur:0,   desc:'MULTI BALL'},
    LASER:  {color:'#ff2d6b',sym:'L',dur:10000,desc:'LASER'},
    SLOW:   {color:'#fbbf24',sym:'S',dur:10000,desc:'SLOW BALL'},
    LIFE:   {color:'#34d399',sym:'+',dur:0,   desc:'EXTRA LIFE'},
    CATCH:  {color:'#f97316',sym:'C',dur:12000,desc:'CATCH'},
    FIRE:   {color:'#ef4444',sym:'F',dur:10000,desc:'FIREBALL'},
  };

  /* ── Paddle ── */
  const pad = { x:W/2, y:H-40, w:90, h:14, baseW:90, targetW:90, glow:0,
    get l(){return this.x-this.w/2}, get r(){return this.x+this.w/2},
    get t(){return this.y-this.h/2}, get b(){return this.y+this.h/2} };

  /* ── Ball ── */
  const BR = 6, BASE_SPD = 4.8;
  let balls = [];
  function mkBall(x,y,vx,vy){
    return {x:x||W/2, y:y||pad.t-BR-2, vx:vx||0, vy:vy||0, r:BR,
      trail:[], attached:true, speed:BASE_SPD, fire:false};
  }

  /* ── Bricks ── */
  let bricks = [];
  const BROWS=8, BCOLS=11, BW=44, BH=18, BPAD=4;
  const BOX=(W-(BCOLS*(BW+BPAD)-BPAD))/2, BOY=60;
  const BCOLS_PAL=[
    {f:'#ff2d6b',g:'rgba(255,45,107,.4)',hp:1,pts:10},
    {f:'#ff6b3d',g:'rgba(255,107,61,.4)',hp:1,pts:10},
    {f:'#fbbf24',g:'rgba(251,191,36,.4)',hp:1,pts:10},
    {f:'#34d399',g:'rgba(52,211,153,.4)',hp:1,pts:10},
    {f:'#00f0ff',g:'rgba(0,240,255,.4)', hp:2,pts:20},
    {f:'#a855f7',g:'rgba(168,85,247,.4)',hp:2,pts:20},
    {f:'#e0e7ff',g:'rgba(224,231,255,.3)',hp:3,pts:50},
  ];

  /* ── Level patterns (infinite cycling with increasing difficulty) ── */
  function genLevel(lv){
    bricks=[];
    const patterns=[patClassic,patDiamond,patChecker,patWave,patFortress,patSpiral,patArrow,patHeart];
    const fn=patterns[(lv-1)%patterns.length];
    fn(lv);
  }
  function mkBrick(r,c,ci,hp){
    return {x:BOX+c*(BW+BPAD),y:BOY+r*(BH+BPAD),w:BW,h:BH,ci,hp,maxHp:hp,alive:true,shk:0};
  }
  function addHp(lv){return Math.floor((lv-1)/3);}

  function patClassic(lv){
    for(let r=0;r<BROWS;r++) for(let c=0;c<BCOLS;c++){
      const ci=Math.min(r,BCOLS_PAL.length-1);
      const hp=Math.min(BCOLS_PAL[ci].hp+addHp(lv),6);
      bricks.push(mkBrick(r,c,ci,hp));
    }
  }
  function patDiamond(lv){
    const cx=Math.floor(BCOLS/2),cy=Math.floor(BROWS/2);
    for(let r=0;r<BROWS;r++) for(let c=0;c<BCOLS;c++){
      if(Math.abs(c-cx)+Math.abs(r-cy)<=4){
        const ci=Math.min(Math.abs(c-cx)+Math.abs(r-cy),BCOLS_PAL.length-1);
        bricks.push(mkBrick(r,c,ci,Math.min(BCOLS_PAL[ci].hp+addHp(lv),6)));
      }
    }
  }
  function patChecker(lv){
    for(let r=0;r<BROWS;r++) for(let c=0;c<BCOLS;c++){
      if((r+c)%2===0){
        const ci=Math.min(r,BCOLS_PAL.length-1);
        bricks.push(mkBrick(r,c,ci,Math.min(BCOLS_PAL[ci].hp+addHp(lv),6)));
      }
    }
  }
  function patWave(lv){
    for(let r=0;r<BROWS;r++) for(let c=0;c<BCOLS;c++){
      if(r<=Math.floor(Math.sin(c*.7)*2+3)){
        const ci=Math.min(c%BCOLS_PAL.length,BCOLS_PAL.length-1);
        bricks.push(mkBrick(r,c,ci,Math.min(BCOLS_PAL[ci].hp+addHp(lv),6)));
      }
    }
  }
  function patFortress(lv){
    for(let r=0;r<BROWS;r++) for(let c=0;c<BCOLS;c++){
      const wall=c===0||c===BCOLS-1||r===0;
      const inner=r>=2&&r<=5&&c>=3&&c<=7;
      if(wall||inner){
        const ci=wall?6:Math.min(r,BCOLS_PAL.length-1);
        bricks.push(mkBrick(r,c,ci,Math.min((wall?4:BCOLS_PAL[ci].hp)+addHp(lv),8)));
      }
    }
  }
  function patSpiral(lv){
    for(let r=0;r<BROWS;r++) for(let c=0;c<BCOLS;c++){
      if((r+c)%3!==0){
        const ci=Math.min((r+c)%BCOLS_PAL.length,BCOLS_PAL.length-1);
        bricks.push(mkBrick(r,c,ci,Math.min(BCOLS_PAL[ci].hp+addHp(lv),6)));
      }
    }
  }
  function patArrow(lv){
    for(let r=0;r<BROWS;r++) for(let c=0;c<BCOLS;c++){
      const cx=Math.floor(BCOLS/2);
      if(c>=cx-r&&c<=cx+r&&r<=4||r>=4&&r<=7){
        const ci=Math.min(r,BCOLS_PAL.length-1);
        bricks.push(mkBrick(r,c,ci,Math.min(BCOLS_PAL[ci].hp+addHp(lv),6)));
      }
    }
  }
  function patHeart(lv){
    const grid=Array.from({length:BROWS},()=>Array(BCOLS).fill(false));
    const pts=[[3,2],[3,3],[3,7],[3,8],[2,1],[2,4],[2,6],[2,9],[1,1],[1,9],[4,3],[4,7],[5,4],[5,5],[5,6],[6,5]];
    for(const[r,c] of pts) if(r<BROWS&&c<BCOLS) grid[r][c]=true;
    for(let r=0;r<BROWS;r++) for(let c=0;c<BCOLS;c++){
      const mirror=BCOLS-1-c;
      if(grid[r][c]||grid[r][mirror]){
        const ci=Math.min(r,BCOLS_PAL.length-1);
        bricks.push(mkBrick(r,c,ci,Math.min(BCOLS_PAL[ci].hp+addHp(lv),6)));
      }
    }
  }

  /* ── Input ── */
  let mouseX=W/2, keys={};
  let useKeyboard=false;

  canvas.addEventListener('mousemove',e=>{
    const rect=canvas.getBoundingClientRect();
    mouseX=(e.clientX-rect.left)*(W/rect.width);
    useKeyboard=false;
  });
  canvas.addEventListener('click',()=>{
    if(state===STATE.MENU||state===STATE.GAMEOVER) startGame();
    else if(state===STATE.BALLHELD) releaseBalls();
  });
  document.addEventListener('keydown',e=>{
    keys[e.code]=true;
    if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space'].includes(e.code)){
      useKeyboard=true;
      e.preventDefault();
    }
    if(e.code==='Space'){
      if(state===STATE.MENU||state===STATE.GAMEOVER) startGame();
      else if(state===STATE.BALLHELD) releaseBalls();
    }
  });
  document.addEventListener('keyup',e=>{keys[e.code]=false;});

  function releaseBalls(){
    balls.forEach(b=>{
      if(b.attached){
        b.attached=false;
        const angle=(Math.random()-0.5)*Math.PI/3;
        b.vx=b.speed*Math.sin(angle);
        b.vy=-b.speed*Math.cos(angle);
      }
    });
    state=STATE.PLAYING;
  }

  /* ── Game lifecycle ── */
  function startGame(){
    score=0;lives=5;level=1;
    activePowerUps={};lasers=[];powerUps=[];particles=[];
    pad.w=pad.baseW;pad.targetW=pad.baseW;
    overlay.classList.remove('visible');
    beginLevel();
    state=STATE.BALLHELD;
  }

  function beginLevel(){
    genLevel(level);
    balls=[mkBall()];
    powerUps=[];lasers=[];
    // Don't reset power-ups between levels — keep active ones
    updateHUD();
    // Show level banner
    showBanner(`LEVEL ${level}`);
  }

  function showBanner(text){
    banner.textContent=text;
    banner.classList.add('show');
    setTimeout(()=>banner.classList.remove('show'),1800);
  }

  function loseLife(){
    lives--;
    updateHUD();
    if(lives<=0){
      state=STATE.GAMEOVER;
      showOverlay('GAME OVER',`SCORE: ${score}`,`LEVEL ${level} REACHED`);
      return;
    }
    activePowerUps={};pad.targetW=pad.baseW;lasers=[];powerUps=[];
    balls=[mkBall()];
    state=STATE.BALLHELD;
  }

  function showOverlay(title,sub,extra){
    overlay.innerHTML=`<h1>${title}</h1>
      ${sub?`<div class="final-score">${sub}</div>`:''}
      ${extra?`<div class="final-level">${extra}</div>`:''}
      <div class="prompt">CLICK TO START</div>`;
    overlay.classList.add('visible');
  }

  function updateHUD(){
    scoreEl.textContent=score;
    levelEl.textContent=level;
    let h='';
    for(let i=0;i<5;i++) h+=`<div class="life-pip${i<lives?'':' lost'}"></div>`;
    livesEl.innerHTML=h;
  }

  /* ── Particles & Power-ups ── */
  function spawnP(x,y,col,n=12){
    for(let i=0;i<n;i++){
      const a=Math.random()*Math.PI*2,sp=1+Math.random()*4;
      particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,dec:.015+Math.random()*.025,sz:2+Math.random()*3,col});
    }
  }
  function spawnPU(x,y){
    if(Math.random()>.22) return;
    const types=Object.keys(PU);
    const t=types[Math.floor(Math.random()*types.length)];
    powerUps.push({x,y,vy:1.6,type:t,...PU[t],sz:12,time:0});
  }
  function activatePU(t){
    switch(t){
      case'WIDE':
        pad.targetW=pad.baseW*1.7;activePowerUps.WIDE=Date.now()+PU.WIDE.dur;break;
      case'MULTI':
        const ex=[...balls.filter(b=>!b.attached)];
        ex.forEach(b=>{
          const a1=Math.PI/6,a2=-Math.PI/6;
          const nb1=mkBall(b.x,b.y,b.speed*Math.sin(a1),-b.speed*Math.cos(a1));
          nb1.attached=false;nb1.speed=b.speed;balls.push(nb1);
          const nb2=mkBall(b.x,b.y,b.speed*Math.sin(a2),-b.speed*Math.cos(a2));
          nb2.attached=false;nb2.speed=b.speed;balls.push(nb2);
        });break;
      case'LASER':
        activePowerUps.LASER=Date.now()+PU.LASER.dur;break;
      case'SLOW':
        balls.forEach(b=>{b.speed=BASE_SPD*.55;});
        activePowerUps.SLOW=Date.now()+PU.SLOW.dur;break;
      case'LIFE':
        lives=Math.min(lives+1,5);updateHUD();break;
      case'CATCH':
        activePowerUps.CATCH=Date.now()+PU.CATCH.dur;break;
      case'FIRE':
        balls.forEach(b=>{b.fire=true;});
        activePowerUps.FIRE=Date.now()+PU.FIRE.dur;break;
    }
  }

  /* ── Update ── */
  let laserCD=0;

  function update(dt){
    if(state===STATE.LEVELUP){
      levelUpTimer-=dt;
      if(levelUpTimer<=0){state=STATE.BALLHELD;beginLevel();}
      return;
    }
    if(state!==STATE.PLAYING&&state!==STATE.BALLHELD) return;

    // Paddle movement
    if(useKeyboard){
      const spd=7;
      if(keys.ArrowLeft)  pad.x-=spd;
      if(keys.ArrowRight) pad.x+=spd;
    } else {
      pad.x+=(mouseX-pad.x)*0.2;
    }
    pad.x=Math.max(pad.w/2,Math.min(W-pad.w/2,pad.x));
    pad.w+=(pad.targetW-pad.w)*0.12;

    // Laser firing
    laserCD-=dt;
    if(activePowerUps.LASER&&Date.now()<activePowerUps.LASER&&laserCD<=0){
      lasers.push({x:pad.x-pad.w*.35,y:pad.t-4,vy:-9});
      lasers.push({x:pad.x+pad.w*.35,y:pad.t-4,vy:-9});
      laserCD=200;
    }

    // Expiry checks
    const now=Date.now();
    for(const k of['WIDE','LASER','SLOW','CATCH','FIRE']){
      if(activePowerUps[k]&&now>activePowerUps[k]){
        delete activePowerUps[k];
        if(k==='WIDE') pad.targetW=pad.baseW;
        if(k==='SLOW') balls.forEach(b=>{b.speed=BASE_SPD;});
        if(k==='FIRE') balls.forEach(b=>{b.fire=false;});
      }
    }

    // Lasers
    for(let i=lasers.length-1;i>=0;i--){
      const l=lasers[i];l.y+=l.vy;
      if(l.y<-10){lasers.splice(i,1);continue;}
      for(const br of bricks){
        if(!br.alive)continue;
        if(l.x>br.x&&l.x<br.x+br.w&&l.y>br.y&&l.y<br.y+br.h){
          hitBrick(br);lasers.splice(i,1);break;
        }
      }
    }

    // Combo
    if(comboTimer>0){comboTimer-=dt;if(comboTimer<=0)combo=0;}

    // Balls
    for(let bi=balls.length-1;bi>=0;bi--){
      const b=balls[bi];
      if(b.attached){b.x=pad.x;b.y=pad.t-b.r-2;continue;}

      // Trail
      b.trail.push({x:b.x,y:b.y,l:1});
      if(b.trail.length>14)b.trail.shift();
      b.trail.forEach(t=>t.l-=.07);

      b.x+=b.vx;b.y+=b.vy;

      // Walls
      if(b.x-b.r<0){b.x=b.r;b.vx=Math.abs(b.vx);}
      if(b.x+b.r>W){b.x=W-b.r;b.vx=-Math.abs(b.vx);}
      if(b.y-b.r<0){b.y=b.r;b.vy=Math.abs(b.vy);}

      // Paddle
      if(b.vy>0&&b.y+b.r>=pad.t&&b.y-b.r<=pad.b+4&&b.x>=pad.l-2&&b.x<=pad.r+2){
        if(activePowerUps.CATCH&&Date.now()<activePowerUps.CATCH){
          b.attached=true;b.vx=0;b.vy=0;
          state=STATE.BALLHELD;
        } else {
          const rel=(b.x-pad.x)/(pad.w/2);
          const angle=rel*(Math.PI/3);
          b.vx=b.speed*Math.sin(angle);
          b.vy=-b.speed*Math.cos(angle);
          b.y=pad.t-b.r-1;
        }
        combo=0;pad.glow=1;
        spawnP(b.x,b.y,'#00f0ff',6);
      }

      // Bricks
      for(const br of bricks){
        if(!br.alive)continue;
        if(ballBrick(b,br)){
          if(b.fire){br.hp=0;hitBrick(br);}
          else hitBrick(br);
          break;
        }
      }

      // Lost
      if(b.y>H+30){balls.splice(bi,1);if(balls.length===0)loseLife();}
    }

    // Power-ups falling
    for(let i=powerUps.length-1;i>=0;i--){
      const p=powerUps[i];p.y+=p.vy;p.time+=dt;
      if(p.y>H+20){powerUps.splice(i,1);continue;}
      if(p.y+p.sz>=pad.t&&p.y-p.sz<=pad.b&&p.x>=pad.l&&p.x<=pad.r){
        activatePU(p.type);
        spawnP(p.x,p.y,p.col,16);
        powerUps.splice(i,1);
      }
    }

    // Particles
    for(let i=particles.length-1;i>=0;i--){
      const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.04;p.life-=p.dec;
      if(p.life<=0)particles.splice(i,1);
    }

    if(screenFlash>0)screenFlash-=.03;
    if(pad.glow>0)pad.glow-=.04;

    // Level complete
    if(bricks.every(b=>!b.alive)){
      level++;
      levelUpTimer=2200;
      state=STATE.LEVELUP;
      showBanner(`LEVEL ${level}`);
      // Increase base difficulty slightly
    }
  }

  function ballBrick(b,br){
    const cx=Math.max(br.x,Math.min(b.x,br.x+br.w));
    const cy=Math.max(br.y,Math.min(b.y,br.y+br.h));
    const dx=b.x-cx,dy=b.y-cy;
    if(dx*dx+dy*dy<=b.r*b.r){
      if(!b.fire){
        const oL=b.x+b.r-br.x, oR=br.x+br.w-(b.x-b.r), oT=b.y+b.r-br.y, oB=br.y+br.h-(b.y-b.r);
        const m=Math.min(oL,oR,oT,oB);
        if(m===oT||m===oB)b.vy=-b.vy;else b.vx=-b.vx;
      }
      return true;
    }
    return false;
  }

  function hitBrick(br){
    br.hp--;br.shk=6;
    if(br.hp<=0){
      br.alive=false;combo++;comboTimer=1800;
      const mult=Math.min(combo,10);
      score+=BCOLS_PAL[br.ci].pts*mult;
      screenFlash=.12;
      spawnP(br.x+br.w/2,br.y+br.h/2,BCOLS_PAL[br.ci].f,20);
      spawnPU(br.x+br.w/2,br.y+br.h/2);
      updateHUD();
    } else {
      spawnP(br.x+br.w/2,br.y+br.h/2,BCOLS_PAL[br.ci].f,5);
    }
  }

  /* ── Render ── */
  function render(){
    ctx.clearRect(0,0,W,H);

    // Grid
    ctx.strokeStyle='rgba(0,240,255,0.02)';ctx.lineWidth=1;
    for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

    if(screenFlash>0){ctx.fillStyle=`rgba(255,255,255,${screenFlash})`;ctx.fillRect(0,0,W,H);}

    // Bricks
    for(const br of bricks){
      if(!br.alive)continue;
      const col=BCOLS_PAL[br.ci];
      const sx=br.shk>0?(Math.random()-.5)*3:0;
      const sy=br.shk>0?(Math.random()-.5)*3:0;
      if(br.shk>0)br.shk--;
      const hpR=br.hp/br.maxHp;

      ctx.shadowColor=col.g;ctx.shadowBlur=10;
      const gr=ctx.createLinearGradient(br.x,br.y,br.x,br.y+br.h);
      gr.addColorStop(0,col.f);gr.addColorStop(1,adjB(col.f,-30));
      ctx.fillStyle=gr;
      rRect(ctx,br.x+sx,br.y+sy,br.w,br.h,3);ctx.fill();

      if(br.maxHp>1){
        ctx.fillStyle=`rgba(255,255,255,${.3+hpR*.4})`;
        ctx.font='bold 10px Orbitron';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(br.hp,br.x+br.w/2+sx,br.y+br.h/2+sy);
      }
      ctx.fillStyle='rgba(255,255,255,0.15)';
      rRect(ctx,br.x+sx+2,br.y+sy+1,br.w-4,br.h/3,2);ctx.fill();
      ctx.shadowBlur=0;
    }

    // Power-ups
    for(const p of powerUps){
      ctx.save();
      const bob=Math.sin(p.time/150)*2;
      ctx.shadowColor=p.color;ctx.shadowBlur=14;
      ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y+bob,p.sz,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#000';ctx.font='bold 11px Orbitron';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(p.sym,p.x,p.y+bob+1);
      ctx.restore();
    }

    // Lasers
    for(const l of lasers){
      ctx.save();ctx.shadowColor='#ff2d6b';ctx.shadowBlur=8;ctx.fillStyle='#ff2d6b';
      ctx.fillRect(l.x-1.5,l.y,3,12);ctx.restore();
    }

    // Balls
    for(const b of balls){
      for(const t of b.trail){
        if(t.l<=0)continue;
        ctx.beginPath();ctx.arc(t.x,t.y,b.r*t.l*.7,0,Math.PI*2);
        ctx.fillStyle=b.fire?`rgba(255,100,30,${t.l*.3})`:`rgba(0,240,255,${t.l*.25})`;ctx.fill();
      }
      ctx.save();
      ctx.shadowColor=b.fire?'#ff4400':'#00f0ff';ctx.shadowBlur=18;
      const bg=ctx.createRadialGradient(b.x-1,b.y-1,0,b.x,b.y,b.r);
      if(b.fire){
        bg.addColorStop(0,'#fff');bg.addColorStop(.3,'#ffaa00');bg.addColorStop(1,'#ff3300');
      } else {
        bg.addColorStop(0,'#fff');bg.addColorStop(.4,'#b0f8ff');bg.addColorStop(1,'#00d4ff');
      }
      ctx.fillStyle=bg;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }

    // Paddle
    ctx.save();
    const pg=ctx.createLinearGradient(pad.l,pad.t,pad.l,pad.b);
    pg.addColorStop(0,pad.glow>0?'#40f0ff':'#1a8fa0');
    pg.addColorStop(.5,pad.glow>0?'#00f0ff':'#0a6e7e');
    pg.addColorStop(1,pad.glow>0?'#00b8cc':'#065566');
    ctx.shadowColor=`rgba(0,240,255,${.3+pad.glow*.5})`;ctx.shadowBlur=15+pad.glow*15;
    ctx.fillStyle=pg;rRect(ctx,pad.l,pad.t,pad.w,pad.h,7);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.2)';rRect(ctx,pad.l+4,pad.t+2,pad.w-8,pad.h*.35,4);ctx.fill();
    ctx.fillStyle=`rgba(0,240,255,${.5+Math.sin(Date.now()/300)*.2})`;
    ctx.beginPath();ctx.arc(pad.x,pad.y,2.5,0,Math.PI*2);ctx.fill();
    // Laser indicators
    if(activePowerUps.LASER&&Date.now()<activePowerUps.LASER){
      ctx.fillStyle='rgba(255,45,107,0.7)';
      ctx.fillRect(pad.x-pad.w*.35-2,pad.t-6,4,6);
      ctx.fillRect(pad.x+pad.w*.35-2,pad.t-6,4,6);
    }
    ctx.restore();

    // Particles
    for(const p of particles){
      ctx.globalAlpha=p.life;ctx.fillStyle=p.col;ctx.shadowColor=p.col;ctx.shadowBlur=6;
      ctx.beginPath();ctx.arc(p.x,p.y,p.sz*p.life,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;ctx.shadowBlur=0;

    // Combo
    if(combo>1&&comboTimer>0){
      ctx.save();ctx.font='bold 16px Orbitron';ctx.textAlign='center';
      ctx.fillStyle=`rgba(251,191,36,${Math.min(comboTimer/500,1)})`;
      ctx.shadowColor='rgba(251,191,36,0.5)';ctx.shadowBlur=10;
      ctx.fillText(`COMBO x${Math.min(combo,10)}`,W/2,H-80);ctx.restore();
    }

    // Active power-up timers
    let pi=0;
    for(const[k,exp] of Object.entries(activePowerUps)){
      const rem=Math.max(0,exp-Date.now());if(rem<=0)continue;
      const pct=rem/PU[k].dur;
      ctx.save();ctx.font='10px Share Tech Mono';ctx.textAlign='left';
      ctx.fillStyle=PU[k].color;ctx.shadowColor=PU[k].color;ctx.shadowBlur=6;
      ctx.fillText(`${PU[k].desc}`,10,H-14-pi*18);
      ctx.fillStyle=`${PU[k].color}33`;ctx.fillRect(120,H-22-pi*18,50,8);
      ctx.fillStyle=PU[k].color;ctx.fillRect(120,H-22-pi*18,50*pct,8);
      ctx.restore();pi++;
    }

    // "Launch" hint
    if(state===STATE.BALLHELD){
      ctx.save();ctx.font='13px Share Tech Mono';ctx.textAlign='center';
      ctx.fillStyle=`rgba(0,240,255,${.4+Math.sin(Date.now()/400)*.3})`;
      ctx.fillText('CLICK or SPACE to launch',W/2,H-70);ctx.restore();
    }

    // Level up overlay
    if(state===STATE.LEVELUP){
      ctx.save();
      ctx.fillStyle=`rgba(6,6,14,${Math.min((2200-levelUpTimer)/800,.6)})`;
      ctx.fillRect(0,0,W,H);
      ctx.restore();
    }
  }

  function rRect(c,x,y,w,h,r){
    c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);
    c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);
    c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();
  }
  function adjB(hex,amt){
    let r=parseInt(hex.slice(1,3),16)+amt,g=parseInt(hex.slice(3,5),16)+amt,b=parseInt(hex.slice(5,7),16)+amt;
    r=Math.max(0,Math.min(255,r));g=Math.max(0,Math.min(255,g));b=Math.max(0,Math.min(255,b));
    return`rgb(${r},${g},${b})`;
  }

  /* ── Loop ── */
  let last=0;
  function loop(ts){
    const dt=ts-last;last=ts;
    update(dt);render();
    requestAnimationFrame(loop);
  }
  updateHUD();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
