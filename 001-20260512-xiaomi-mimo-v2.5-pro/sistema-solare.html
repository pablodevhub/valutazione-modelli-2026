<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Solare Interattivo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#000;overflow:hidden;font-family:'Exo 2',sans-serif;user-select:none}
        #canvas{display:block;cursor:crosshair}
        #title{position:fixed;top:22px;left:50%;transform:translateX(-50%);font-family:'Orbitron',sans-serif;font-weight:400;font-size:.8em;color:rgba(80,120,180,.3);letter-spacing:8px;pointer-events:none;z-index:5;animation:fi 2s ease-out}
        @keyframes fi{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

        #info-panel{position:fixed;bottom:20px;right:20px;width:280px;max-height:calc(100vh - 40px);background:rgba(6,10,22,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(70,130,200,.12);border-radius:12px;color:#c0d0e0;transform:translateX(340px);opacity:0;transition:transform .5s cubic-bezier(.16,1,.3,1),opacity .3s ease;z-index:20;display:flex;flex-direction:column}
        #info-panel.visible{transform:translateX(0);opacity:1}
        #color-bar{height:3px;border-radius:12px 12px 0 0;flex-shrink:0}
        .p-head{padding:16px 20px 0;position:relative;flex-shrink:0}
        .p-body{padding:10px 20px 18px;overflow-y:auto;flex:1}
        .p-body::-webkit-scrollbar{width:3px}
        .p-body::-webkit-scrollbar-track{background:transparent}
        .p-body::-webkit-scrollbar-thumb{background:rgba(70,130,200,.15);border-radius:2px}
        .close-btn{position:absolute;top:14px;right:14px;background:none;border:none;color:#4a6880;font-size:18px;cursor:pointer;transition:color .2s;line-height:1}
        .close-btn:hover{color:#c0d8f0}
        #p-name{font-family:'Orbitron',sans-serif;font-weight:700;font-size:1.15em;color:#f0f4f8;letter-spacing:3px;margin-bottom:4px}
        .info-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(70,130,200,.05);font-size:.78em}
        .info-label{color:#506880;font-weight:300}
        .info-value{color:#c8d8e8;font-weight:600;text-align:right}
        #p-desc{margin-top:10px;font-size:.78em;line-height:1.7;color:#708aa0}
        #moons{margin-top:12px;padding-top:10px;border-top:1px solid rgba(70,130,200,.08)}
        #moons h4{font-family:'Orbitron',sans-serif;font-weight:400;font-size:.6em;color:#4a6880;letter-spacing:2px;margin-bottom:6px}
        .moon-item{font-size:.78em;padding:2px 0;color:#8aa0b8}
        .moon-dot{display:inline-block;width:5px;height:5px;border-radius:50%;margin-right:7px;vertical-align:middle}

        #ast-panel{position:fixed;top:20px;left:20px;width:280px;max-height:calc(100vh - 40px);background:rgba(6,10,22,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(220,130,50,.15);border-radius:12px;color:#d0a870;transform:translateX(-340px);opacity:0;transition:transform .5s cubic-bezier(.16,1,.3,1),opacity .3s ease;z-index:20;display:flex;flex-direction:column}
        #ast-panel.visible{transform:translateX(0);opacity:1}
        #ast-color-bar{height:3px;border-radius:12px 12px 0 0;background:#d07030;flex-shrink:0}
        .ast-head{padding:16px 18px 0;flex-shrink:0}
        .ast-head h2{font-family:'Orbitron',sans-serif;font-weight:700;font-size:1em;letter-spacing:2px;color:#f0c090}
        .ast-body{padding:10px 18px 18px;overflow-y:auto;flex:1}
        .ast-body .info-label{color:#806040}
        .ast-body .info-value{color:#d8b888}
        #ast-desc{margin-top:10px;font-size:.76em;line-height:1.65;color:#a08868}

        #ast-btns{position:fixed;top:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:15}
        .ast-btn{background:rgba(6,10,22,.82);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(220,130,50,.15);border-radius:8px;padding:10px 14px;color:#d09858;font-family:'Orbitron',sans-serif;font-size:.62em;font-weight:700;letter-spacing:1.5px;cursor:pointer;transition:all .3s ease;text-align:left;line-height:1.4;animation:pulse 3s ease-in-out infinite}
        .ast-btn span{display:block;font-family:'Exo 2',sans-serif;font-weight:300;font-size:.95em;color:#705838;letter-spacing:0;margin-top:2px}
        .ast-btn:hover{border-color:rgba(220,130,50,.5);background:rgba(220,130,50,.06);color:#f0b878}
        .ast-btn.active{border-color:rgba(220,130,50,.7);background:rgba(220,130,50,.1);animation:none}
        @keyframes pulse{0%,100%{border-color:rgba(220,130,50,.1)}50%{border-color:rgba(220,130,50,.3)}}

        #speed-ctrl{position:fixed;bottom:20px;left:20px;display:flex;align-items:center;gap:10px;z-index:15}
        #speed-ctrl label{font-family:'Orbitron',sans-serif;font-size:.5em;color:#3a5878;letter-spacing:2px}
        #speed{-webkit-appearance:none;width:90px;height:2px;background:rgba(70,130,200,.15);border-radius:1px;outline:none}
        #speed::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:#3a78b8;border-radius:50%;cursor:pointer}

        #zoom-hint{position:fixed;bottom:56px;left:20px;font-family:'Orbitron',sans-serif;font-size:.45em;color:rgba(70,110,160,.4);letter-spacing:1px;z-index:15;pointer-events:none}
    </style>
</head>
<body>
    <div id="title">SISTEMA SOLARE</div>
    <canvas id="canvas"></canvas>

    <div id="info-panel">
        <div id="color-bar"></div>
        <div class="p-head">
            <button class="close-btn" id="closeBtn">&times;</button>
            <div id="p-name"></div>
        </div>
        <div class="p-body">
            <div id="p-rows"></div>
            <div id="p-desc"></div>
            <div id="moons"></div>
        </div>
    </div>

    <div id="ast-panel">
        <div id="ast-color-bar"></div>
        <div class="ast-head"><h2 id="ast-name"></h2></div>
        <div class="ast-body">
            <div id="ast-rows"></div>
            <div id="ast-desc"></div>
        </div>
    </div>

    <div id="ast-btns">
        <button class="ast-btn" id="btnO">&#9788; 'OUMUAMUA<span>Oggetto interstellare &middot; 2017</span></button>
        <button class="ast-btn" id="btnA">&#9788; 3I/ATLAS<span>Cometa interstellare &middot; 2025</span></button>
    </div>

    <div id="speed-ctrl">
        <label>VELOCIT&Agrave;</label>
        <input type="range" id="speed" min="0" max="5" step="0.1" value="1">
    </div>
    <div id="zoom-hint">SCROLL = ZOOM &middot; TRASCINA = PAN</div>

<script>
(function(){
'use strict';
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
let W,H,time=0,speedMult=1,selectedPlanet=null,mouseX=-9999,mouseY=-9999;

/* Camera: pan + zoom */
let cam={x:0,y:0,zoom:1,targetZoom:1,dragging:false,dragSX:0,dragSY:0,camSX:0,camSY:0};
const MIN_Z=.25,MAX_Z=6;

function screenToWorld(sx,sy){return{x:(sx-W/2)/cam.zoom+cam.x+cx(),y:(sy-H/2)/cam.zoom+cam.y+cy()}}
function worldToScreen(wx,wy){return{x:(wx-cam.x-cx())*cam.zoom+W/2,y:(wy-cam.y-cy())*cam.zoom+H/2}}

function cx(){return 0}
function cy(){return 0}

let scale;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;scale=Math.min(W,H)/1000;makeStars();makeBg()}
window.addEventListener('resize',resize);

let bgCanvas=null;
function makeBg(){
    bgCanvas=document.createElement('canvas');bgCanvas.width=W;bgCanvas.height=H;
    const bc=bgCanvas.getContext('2d');
    const g=bc.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*.75);
    g.addColorStop(0,'#0c1120');g.addColorStop(.4,'#070b16');g.addColorStop(1,'#020206');
    bc.fillStyle=g;bc.fillRect(0,0,W,H);
    bc.globalAlpha=.035;
    const nc=['#18103a','#0a1528','#100a20','#081418'];
    for(let i=0;i<50;i++){
        const nx=Math.random()*W,ny=Math.random()*H,nr=Math.random()*150+40;
        const ng=bc.createRadialGradient(nx,ny,0,nx,ny,nr);
        ng.addColorStop(0,nc[i%4]);ng.addColorStop(1,'transparent');
        bc.fillStyle=ng;bc.beginPath();bc.arc(nx,ny,nr,0,Math.PI*2);bc.fill();
    }
    bc.globalAlpha=1;
}

let stars=[];
function makeStars(){
    stars=[];
    const n=Math.min(Math.floor(W*H/400),3000);
    for(let i=0;i<n;i++) stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.3+.2,ph:Math.random()*Math.PI*2,fr:Math.random()*1.5+.3,br:Math.random()*.5+.5});
}

const belt=[];
for(let i=0;i<200;i++) belt.push({a:Math.random()*Math.PI*2,f:Math.random(),s:Math.random()*.6+.2,sp:(Math.random()*.3+.05)*.0003});

const planets=[
    {name:'Mercurio',color:'#a8a8a8',r:4.5,orbit:62,spd:4.15,
     info:{'Diametro':'4.879 km','Distanza dal Sole':'57,9 milioni km','Giorno':'58,6 giorni terrestri','Anno':'88 giorni terrestri','Temperatura':'-180\u00b0C / 430\u00b0C','Tipo':'Pianeta roccioso'},
     desc:'Il pi\u00f9 piccolo e vicino pianeta al Sole. Superficie craterizzata simile alla Luna, senza atmosfera significativa.',moons:[]},
    {name:'Venere',color:'#ddc080',r:6,orbit:92,spd:1.62,
     info:{'Diametro':'12.104 km','Distanza dal Sole':'108,2 milioni km','Giorno':'243 giorni terrestri','Anno':'225 giorni terrestri','Temperatura':'462\u00b0C (media)','Tipo':'Pianeta roccioso'},
     desc:'Il pianeta pi\u00f9 caldo per l\'intenso effetto serra. Ruota in senso contrario rispetto agli altri pianeti.',moons:[]},
    {name:'Terra',color:'#4a98d8',r:6.5,orbit:130,spd:1.0,
     info:{'Diametro':'12.742 km','Distanza dal Sole':'149,6 milioni km','Giorno':'24 ore','Anno':'365,25 giorni','Temperatura':'15\u00b0C (media)','Tipo':'Pianeta roccioso'},
     desc:'L\'unico pianeta conosciuto a ospitare vita. Il 71% della superficie \u00e8 coperto da oceani.',
     moons:[{name:'Luna',color:'#b8b8b8',r:2,orb:16,spd:13}]},
    {name:'Marte',color:'#c85830',r:5,orbit:170,spd:.53,
     info:{'Diametro':'6.779 km','Distanza dal Sole':'227,9 milioni km','Giorno':'24,6 ore','Anno':'687 giorni terrestri','Temperatura':'-65\u00b0C (media)','Tipo':'Pianeta roccioso'},
     desc:'Il "Pianeta Rosso". Ospita l\'Olympus Mons (22 km), il vulcano pi\u00f9 grande del sistema solare.',
     moons:[{name:'Fobos',color:'#987858',r:1.2,orb:11,spd:20},{name:'Deimos',color:'#886848',r:.9,orb:15,spd:10}]},
    {name:'Giove',color:'#b88848',r:18,orbit:250,spd:.084,
     info:{'Diametro':'139.820 km','Distanza dal Sole':'778,5 milioni km','Giorno':'9,9 ore','Anno':'11,86 anni terrestri','Temperatura':'-110\u00b0C (nubi)','Tipo':'Gigante gassoso'},
     desc:'Il pi\u00f9 grande pianeta (318 masse terrestri). La Grande Macchia Rossa \u00e8 una tempesta attiva da secoli.',
     moons:[{name:'Io',color:'#d8b838',r:2,orb:26,spd:15},{name:'Europa',color:'#b8c8d8',r:1.8,orb:32,spd:10},{name:'Ganimede',color:'#a89888',r:2.5,orb:39,spd:6},{name:'Callisto',color:'#786858',r:2.2,orb:46,spd:3.5}]},
    {name:'Saturno',color:'#d0b868',r:15,orbit:330,spd:.034,rings:true,
     info:{'Diametro':'116.460 km','Distanza dal Sole':'1,43 miliardi km','Giorno':'10,7 ore','Anno':'29,46 anni terrestri','Temperatura':'-140\u00b0C (nubi)','Tipo':'Gigante gassoso'},
     desc:'Famoso per gli anelli di ghiaccio e polvere. Ha la densit\u00e0 pi\u00f9 bassa \u2014 galleggerebbe in acqua.',
     moons:[{name:'Titano',color:'#c89848',r:2.5,orb:28,spd:8},{name:'Encelado',color:'#d8e0e8',r:1.2,orb:22,spd:14},{name:'Mimas',color:'#b8b8b8',r:1,orb:17,spd:18}]},
    {name:'Urano',color:'#68c0d0',r:11,orbit:405,spd:.012,
     info:{'Diametro':'50.724 km','Distanza dal Sole':'2,87 miliardi km','Giorno':'17,2 ore','Anno':'84 anni terrestri','Temperatura':'-195\u00b0C','Tipo':'Gigante di ghiaccio'},
     desc:'Ruota quasi sdraiato su un fianco (inclinazione 98\u00b0). Il colore azzurro-verde deriva dal metano atmosferico.',
     moons:[{name:'Titania',color:'#a8a8a8',r:1.5,orb:19,spd:8},{name:'Oberon',color:'#989898',r:1.3,orb:25,spd:5}]},
    {name:'Nettuno',color:'#2858c8',r:11,orbit:470,spd:.006,
     info:{'Diametro':'49.244 km','Distanza dal Sole':'4,50 miliardi km','Giorno':'16,1 ore','Anno':'164,8 anni terrestri','Temperatura':'-200\u00b0C','Tipo':'Gigante di ghiaccio'},
     desc:'Venti fino a 2.100 km/h, i pi\u00f9 veloci del sistema solare. Primo pianeta trovato per calcolo matematico.',
     moons:[{name:'Tritone',color:'#a8b8c8',r:1.6,orb:21,spd:-5}]}
];
planets.forEach(p=>{p.angle=Math.random()*Math.PI*2;p._wx=0;p._wy=0;p._r=0;p._or=0;p.moons.forEach(m=>{m.angle=Math.random()*Math.PI*2})});

const astDefs={
    oumuamua:{name:"'Oumuamua",color:'#c86828',trailRGB:[200,104,40],
        info:{'Scoperta':'19 ottobre 2017','Tipo':'Oggetto interstellare','Lunghezza':'~100-1.000 m','Forma':'Allungata (rapporto ~6:1)','Velocit\u00e0':'~87,7 km/s al perielio','Perielio':'0,25 UA dal Sole','Origine':'Spazio interstellare'},
        desc:'Primo oggetto interstellare confermato. Nome hawaiano che significa "messaggero". Forma allungata e traiettoria iperbolica unica e ancora misteriosa.',
        bezier:{p0:{x:.7,y:-.65},p1:{x:-.02,y:.04},p2:{x:-.8,y:.65}}},
    atlas:{name:'3I/ATLAS',color:'#4898e8',trailRGB:[72,152,232],
        info:{'Scoperta':'1\u00b0 luglio 2025','Tipo':'Cometa interstellare','Diametro stimato':'~1-10 km','Velocit\u00e0':'~60 km/s','Avvicinamento Terra':'~274 milioni km','Data avvicinamento':'19 dic. 2025','Osservazioni':'Diversi telescopi NASA'},
        desc:'Terzo oggetto interstellare confermato dopo \'Oumuamua (2017) e 2I/Borisov (2019). Monitorato da numerosi asset NASA.',
        bezier:{p0:{x:-.7,y:-.6},p1:{x:.05,y:-.03},p2:{x:.75,y:.55}}}
};
let ast=null;
/* trajectory visibility per type */
let showTraj=null; /* 'oumuamua' | 'atlas' | null */

function hexRgb(h){const n=parseInt(h.slice(1),16);return[(n>>16)&255,(n>>8)&255,n&255]}
function lerpC(hex,amt){const[r,g,b]=hexRgb(hex);return`rgb(${Math.min(255,Math.max(0,r+amt))},${Math.min(255,Math.max(0,g+amt))},${Math.min(255,Math.max(0,b+amt))})`}

function drawBg(){if(bgCanvas)ctx.drawImage(bgCanvas,0,0)}
function drawStars(){for(const s of stars){const tw=.5+.5*Math.sin(time*.015*s.fr+s.ph);ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(190,210,240,${s.br*tw})`;ctx.fill()}}

function drawSunGlow(wx,wy){
    const s=worldToScreen(wx,wy);
    const sr=Math.max(20*scale*cam.zoom,8),p=1+.06*Math.sin(time*.02),gr=sr*4*p;
    const g=ctx.createRadialGradient(s.x,s.y,sr*.3,s.x,s.y,gr);
    g.addColorStop(0,'rgba(255,200,80,.3)');g.addColorStop(.4,'rgba(255,140,30,.06)');g.addColorStop(1,'rgba(255,80,0,0)');
    ctx.beginPath();ctx.arc(s.x,s.y,gr,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
}
function drawSunBody(wx,wy){
    const s=worldToScreen(wx,wy),sr=Math.max(20*scale*cam.zoom,8);
    const g=ctx.createRadialGradient(s.x-sr*.2,s.y-sr*.2,0,s.x,s.y,sr);
    g.addColorStop(0,'#fffae0');g.addColorStop(.3,'#ffd040');g.addColorStop(.7,'#ff9020');g.addColorStop(1,'#d85810');
    ctx.beginPath();ctx.arc(s.x,s.y,sr,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
}

function drawOrbit(r,wx,wy){
    const c=worldToScreen(wx,wy);
    ctx.beginPath();ctx.ellipse(c.x,c.y,r*cam.zoom,r*.35*cam.zoom,0,0,Math.PI*2);
    ctx.strokeStyle='rgba(50,70,110,.1)';ctx.lineWidth=.5;ctx.stroke();
}

function drawPlanet(p){
    const scr=worldToScreen(p._wx,p._wy);
    const pr=p._r*cam.zoom;
    if(selectedPlanet===p){
        const gg=ctx.createRadialGradient(scr.x,scr.y,pr,scr.x,scr.y,pr*3.5);
        gg.addColorStop(0,'rgba(70,150,255,.12)');gg.addColorStop(1,'rgba(70,150,255,0)');
        ctx.beginPath();ctx.arc(scr.x,scr.y,pr*3.5,0,Math.PI*2);ctx.fillStyle=gg;ctx.fill();
        ctx.beginPath();ctx.arc(scr.x,scr.y,pr+6,0,Math.PI*2);ctx.strokeStyle='rgba(70,150,255,.35)';ctx.lineWidth=1;ctx.setLineDash([4,4]);ctx.lineDashOffset=-time*.5;ctx.stroke();ctx.setLineDash([]);
    }
    const sunS=worldToScreen(0,0);
    const dx=sunS.x-scr.x,dy=sunS.y-scr.y,d=Math.sqrt(dx*dx+dy*dy)||1;
    const hlX=scr.x+(dx/d)*pr*.35,hlY=scr.y+(dy/d)*pr*.35;
    const pg=ctx.createRadialGradient(hlX,hlY,0,scr.x,scr.y,pr);
    pg.addColorStop(0,lerpC(p.color,60));pg.addColorStop(.6,p.color);pg.addColorStop(1,lerpC(p.color,-50));
    ctx.beginPath();ctx.arc(scr.x,scr.y,pr,0,Math.PI*2);ctx.fillStyle=pg;ctx.fill();

    if(p.name==='Giove'&&pr>6){ctx.save();ctx.beginPath();ctx.arc(scr.x,scr.y,pr,0,Math.PI*2);ctx.clip();for(let i=-3;i<=3;i++){ctx.beginPath();ctx.ellipse(scr.x,scr.y+i*pr*.26,pr*1.1,pr*.07,0,0,Math.PI*2);ctx.fillStyle=i%2===0?'rgba(150,110,50,.22)':'rgba(190,150,70,.12)';ctx.fill()}ctx.restore()}
    if(p.rings){ctx.save();ctx.beginPath();ctx.ellipse(scr.x,scr.y,pr*2.3,pr*.5,-.15,0,Math.PI*2);ctx.strokeStyle='rgba(200,180,130,.4)';ctx.lineWidth=Math.max(3*scale*cam.zoom,1.5);ctx.stroke();ctx.beginPath();ctx.ellipse(scr.x,scr.y,pr*1.85,pr*.4,-.15,0,Math.PI*2);ctx.strokeStyle='rgba(180,160,110,.2)';ctx.lineWidth=Math.max(2*scale*cam.zoom,1);ctx.stroke();ctx.restore()}

    ctx.save();ctx.shadowColor='rgba(0,0,0,.8)';ctx.shadowBlur=3;ctx.font=`${Math.max(9,10*scale*cam.zoom)}px "Exo 2"`;ctx.fillStyle='rgba(150,175,210,.55)';ctx.textAlign='center';ctx.fillText(p.name,scr.x,scr.y-pr-7);ctx.restore();

    if(selectedPlanet===p) for(const m of p.moons){
        m.angle+=m.spd*.001*speedMult;
        const mor=Math.max(m.orb*scale*cam.zoom,pr+5);
        const mx=scr.x+mor*Math.cos(m.angle),my=scr.y+mor*Math.sin(m.angle)*.45;
        ctx.beginPath();ctx.ellipse(scr.x,scr.y,mor,mor*.45,0,0,Math.PI*2);ctx.strokeStyle='rgba(70,110,170,.1)';ctx.lineWidth=.5;ctx.stroke();
        const mr=Math.max(m.r*scale*cam.zoom,1.2);ctx.beginPath();ctx.arc(mx,my,mr,0,Math.PI*2);ctx.fillStyle=m.color;ctx.fill();
        ctx.font=`${Math.max(7,8*scale*cam.zoom)}px "Exo 2"`;ctx.fillStyle='rgba(130,155,185,.45)';ctx.textAlign='center';ctx.fillText(m.name,mx,my-mr-3);
    }
}

function drawBelt(){
    const inner=(planets[3].orbit+22)*scale,outer=(planets[4].orbit-30)*scale;
    for(const b of belt){b.a+=b.sp*speedMult;const r=inner+b.f*(outer-inner);const s=worldToScreen(r*Math.cos(b.a),r*Math.sin(b.a)*.35);ctx.beginPath();ctx.arc(s.x,s.y,Math.max(b.s*scale*cam.zoom*.4,.5),0,Math.PI*2);ctx.fillStyle='rgba(100,95,85,.18)';ctx.fill()}
}

/* --- Asteroid trajectory preview (dashed bezier) --- */
function drawAstTrajectory(def,alpha){
    const bz=def.bezier;
    const hmin=Math.min(W,H)*.48;
    ctx.save();
    ctx.setLineDash([8,6]);
    ctx.lineDashOffset=-time*.6;
    ctx.lineWidth=1;
    ctx.strokeStyle=`rgba(${def.trailRGB[0]},${def.trailRGB[1]},${def.trailRGB[2]},${alpha})`;
    ctx.beginPath();
    for(let i=0;i<=60;i++){
        const t=i/60,u=1-t;
        const bx=u*u*bz.p0.x+2*u*t*bz.p1.x+t*t*bz.p2.x;
        const by=u*u*bz.p0.y+2*u*t*bz.p1.y+t*t*bz.p2.y;
        const s=worldToScreen(bx*hmin,by*hmin);
        if(i===0)ctx.moveTo(s.x,s.y);else ctx.lineTo(s.x,s.y);
    }
    ctx.stroke();
    /* arrow head at end */
    const t=0.97,u=1-t;
    const bx=u*u*bz.p0.x+2*u*t*bz.p1.x+t*t*bz.p2.x;
    const by=u*u*bz.p0.y+2*u*t*bz.p1.y+t*t*bz.p2.y;
    const s=worldToScreen(bx*hmin,by*hmin);
    const t2=0.94,u2=1-t2;
    const bx2=u2*u2*bz.p0.x+2*u2*t2*bz.p1.x+t2*t2*bz.p2.x;
    const by2=u2*u2*bz.p0.y+2*u2*t2*bz.p1.y+t2*t2*bz.p2.y;
    const s2=worldToScreen(bx2*hmin,by2*hmin);
    const ang=Math.atan2(s.y-s2.y,s.x-s2.x);
    ctx.setLineDash([]);
    ctx.fillStyle=`rgba(${def.trailRGB[0]},${def.trailRGB[1]},${def.trailRGB[2]},${alpha})`;
    ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(s.x-10*Math.cos(ang-.4),s.y-10*Math.sin(ang-.4));ctx.lineTo(s.x-10*Math.cos(ang+.4),s.y-10*Math.sin(ang+.4));ctx.closePath();ctx.fill();
    ctx.restore();
}

function drawAsteroid(){
    if(!ast)return;
    const def=ast.def,bz=def.bezier,t=ast.t;
    const prox=1-Math.abs(t-.4)*2.2;
    const spd=(.0004+Math.max(0,prox)*.004)*speedMult;
    ast.t+=spd;
    if(ast.t>1.15){ast=null;showTraj=null;setTimeout(()=>document.getElementById('ast-panel').classList.remove('visible'),2000);document.querySelectorAll('.ast-btn').forEach(b=>b.classList.remove('active'));return}
    if(ast.t<0)return;
    const clampT=Math.min(t,1),u=1-clampT;
    const bx=u*u*bz.p0.x+2*u*clampT*bz.p1.x+clampT*clampT*bz.p2.x;
    const by=u*u*bz.p0.y+2*u*clampT*bz.p1.y+clampT*clampT*bz.p2.y;
    const hmin=Math.min(W,H)*.48,wx=bx*hmin,wy=by*hmin;
    ast.trail.push({x:wx,y:wy});if(ast.trail.length>140)ast.trail.shift();

    /* draw trail */
    for(let i=1;i<ast.trail.length;i++){
        const a=(i/ast.trail.length)*.5;
        const s0=worldToScreen(ast.trail[i-1].x,ast.trail[i-1].y);
        const s1=worldToScreen(ast.trail[i].x,ast.trail[i].y);
        ctx.beginPath();ctx.moveTo(s0.x,s0.y);ctx.lineTo(s1.x,s1.y);
        ctx.strokeStyle=`rgba(${def.trailRGB[0]},${def.trailRGB[1]},${def.trailRGB[2]},${a})`;
        ctx.lineWidth=1.5*(i/ast.trail.length);ctx.stroke();
    }
    /* head glow */
    const s=worldToScreen(wx,wy),hr=10*cam.zoom;
    const hg=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,hr);
    hg.addColorStop(0,'rgba(255,255,255,.6)');hg.addColorStop(.3,def.color);hg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.arc(s.x,s.y,hr,0,Math.PI*2);ctx.fillStyle=hg;ctx.fill();
    ctx.beginPath();ctx.arc(s.x,s.y,2.5*cam.zoom,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
    ctx.save();ctx.shadowColor='rgba(0,0,0,.8)';ctx.shadowBlur=4;ctx.font=`bold ${Math.max(9,10*scale*cam.zoom)}px "Orbitron"`;ctx.fillStyle=def.color;ctx.textAlign='center';ctx.fillText(def.name,s.x,s.y-16*cam.zoom);ctx.restore();
}

/* --- Zoom / Pan --- */
canvas.addEventListener('wheel',e=>{
    e.preventDefault();
    const zoomFactor=e.deltaY<0?1.12:1/1.12;
    cam.targetZoom=Math.max(MIN_Z,Math.min(MAX_Z,cam.targetZoom*zoomFactor));
},{passive:false});

canvas.addEventListener('mousedown',e=>{cam.dragging=true;cam.dragSX=e.clientX;cam.dragSY=e.clientY;cam.camSX=cam.x;cam.camSY=cam.y;canvas.style.cursor='grabbing'});
window.addEventListener('mousemove',e=>{
    mouseX=e.clientX;mouseY=e.clientY;
    if(cam.dragging){
        const dx=(e.clientX-cam.dragSX)/cam.zoom,dy=(e.clientY-cam.dragSY)/cam.zoom;
        cam.x=cam.camSX-dx;cam.y=cam.camSY-dy;
    }
    /* hover cursor */
    let over=false;
    for(const p of planets){const s=worldToScreen(p._wx,p._wy);const dx=mouseX-s.x,dy=mouseY-s.y;if(Math.sqrt(dx*dx+dy*dy)<Math.max(p._r*cam.zoom*2.5,18)){over=true;break}}
    if(!cam.dragging)canvas.style.cursor=over?'pointer':'crosshair';
});
window.addEventListener('mouseup',()=>{cam.dragging=false;canvas.style.cursor='crosshair'});

/* click on planet */
canvas.addEventListener('click',e=>{
    for(const p of planets){const s=worldToScreen(p._wx,p._wy);const dx=e.clientX-s.x,dy=e.clientY-s.y;if(Math.sqrt(dx*dx+dy*dy)<Math.max(p._r*cam.zoom*2.5,18)){selectedPlanet=p;showInfo(p);return}}
});
document.getElementById('closeBtn').addEventListener('click',()=>{selectedPlanet=null;document.getElementById('info-panel').classList.remove('visible')});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){selectedPlanet=null;document.getElementById('info-panel').classList.remove('visible')}});
document.getElementById('speed').addEventListener('input',e=>{speedMult=parseFloat(e.target.value)});

function showInfo(p){
    document.getElementById('color-bar').style.background=p.color;
    document.getElementById('p-name').textContent=p.name;
    let rows='';for(const[k,v]of Object.entries(p.info))rows+=`<div class="info-row"><span class="info-label">${k}</span><span class="info-value">${v}</span></div>`;
    document.getElementById('p-rows').innerHTML=rows;
    document.getElementById('p-desc').textContent=p.desc;
    const md=document.getElementById('moons');
    if(p.moons.length){let h='<h4>SATELLITI PRINCIPALI</h4>';for(const m of p.moons)h+=`<div class="moon-item"><span class="moon-dot" style="background:${m.color}"></span>${m.name}</div>`;md.innerHTML=h;md.style.display=''}else md.style.display='none';
    document.getElementById('info-panel').classList.add('visible');
}

function launchAst(type){
    if(ast)return;
    const def=astDefs[type];
    ast={def,t:0,trail:[]};
    showTraj=type;
    document.getElementById('ast-color-bar').style.background=def.color;
    document.getElementById('ast-name').textContent=def.name;
    let rows='';for(const[k,v]of Object.entries(def.info))rows+=`<div class="info-row"><span class="info-label">${k}</span><span class="info-value">${v}</span></div>`;
    document.getElementById('ast-rows').innerHTML=rows;document.getElementById('ast-desc').textContent=def.desc;
    document.getElementById('ast-panel').classList.add('visible');
    document.querySelectorAll('.ast-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById(type==='oumuamua'?'btnO':'btnA').classList.add('active');
}

/* if no asteroid active, buttons still show trajectory preview */
document.getElementById('btnO').addEventListener('click',()=>{if(ast){ast=null;showTraj=null;document.getElementById('ast-panel').classList.remove('visible');document.querySelectorAll('.ast-btn').forEach(b=>b.classList.remove('active'));return}launchAst('oumuamua')});
document.getElementById('btnA').addEventListener('click',()=>{if(ast){ast=null;showTraj=null;document.getElementById('ast-panel').classList.remove('visible');document.querySelectorAll('.ast-btn').forEach(b=>b.classList.remove('active'));return}launchAst('atlas')});

/* === Animate === */
function animate(){
    time++;
    /* smooth zoom */
    cam.zoom+=(cam.targetZoom-cam.zoom)*.12;

    ctx.clearRect(0,0,W,H);
    drawBg();drawStars();

    /* compute world positions */
    for(const p of planets){
        p._or=p.orbit*scale;
        p._r=Math.max(p.r*scale,2);
        p.angle+=p.spd*.002*speedMult;
        p._wx=p._or*Math.cos(p.angle);
        p._wy=p._or*Math.sin(p.angle)*.35;
    }

    /* draw asteroid trajectory preview if visible */
    if(showTraj){
        const def=astDefs[showTraj];
        drawAstTrajectory(def, ast ? .15 : .25);
    }

    /* orbits */
    for(const p of planets) drawOrbit(p._or,0,0);
    drawBelt();

    /* depth sort */
    const sorted=[...planets].sort((a,b)=>a._wy-b._wy);
    drawSunGlow(0,0);
    for(const p of sorted) if(p._wy<0) drawPlanet(p);
    drawSunBody(0,0);
    for(const p of sorted) if(p._wy>=0) drawPlanet(p);

    drawAsteroid();
    requestAnimationFrame(animate);
}
resize();animate();
})();
</script>
