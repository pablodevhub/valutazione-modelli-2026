<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#060a12"/>
      <stop offset="50%" stop-color="#0e1a18"/>
      <stop offset="100%" stop-color="#152520"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d0c490" stop-opacity=".15"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="12"/></filter>
    <filter id="eyeGlow"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <radialGradient id="vignette" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#000" stop-opacity=".45"/>
    </radialGradient>
  </defs>

